<mat-card>
    <mat-card-header>
        <mat-card-subtitle>
            <span class="activity-main-info">
                @for (activityType of activity().activities; track activityType) {
                    <span class="activity-type inline-list-item">
                        {{ 'VisitActivityTypes.' + activityType  | translate }}</span>
                }
                <div class="children">
                    <mat-chip-listbox>
                        @for (visitedChildId of activity().children; track visitedChildId) {
                            <mat-chip-row>{{ childrenById()[visitedChildId].child.name }}</mat-chip-row>
                        }
                    </mat-chip-listbox>
                </div>
            </span>
            <span class="operation-btns">
                <span class="operation-btn edit-btn">
                    <button mat-mini-fab color="accent" (click)="editWanted.emit()">
                        <mat-icon>edit</mat-icon>
                    </button>
                </span>
                <span class="operation-btn delete-btn">
                    <button mat-mini-fab color="accent" type="button" (click)="removeWanted.emit()">
                        <mat-icon>delete</mat-icon>
                    </button>
                </span>
            </span>
        </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
        {{ activity().comment }}
    </mat-card-content>
</mat-card>
