<div class="title">
    <h1>{{ 'Visit.Connections.Title' | translate }}</h1>
    @if (permissions.has(Permission.canWriteVisitConnections)) {
        <span class="add-btn">
            <button mat-mini-fab color="accent" (click)="toggleCreation()">
                @if (creationOpened()) {
                    <mat-icon>close</mat-icon>
                } @else {
                    <mat-icon>add</mat-icon>
                }
            </button>
        </span>
    }
</div>

@if (creationOpened()) {
    <mat-card>
        <mat-card-content>
            <app-visit-connection-create [visit]="visit()" (submitted)="addConnection($event)"/>
        </mat-card-content>
    </mat-card>
}

@if (connections().length === 0) {
    <div>{{ 'Visit.Connections.NoConnection' | translate }}</div>
} @else {
    @for (connected of connections(); track connected.id) {
        <mat-card>
            <mat-card-content>
                <app-visit-connected-visit [visit]="connected"
                                           (delete)="removeConnection(connected.id)"/>
            </mat-card-content>
        </mat-card>
    }

}
