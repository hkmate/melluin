<mat-form-field>
    <mat-label>{{ label() }}</mat-label>
    <input matInput
           [attr.type]="type()"
           [attr.autocomplete]="autocomplete()"
           [placeholder]="placeholder()"
           [formField]="innerForm.innerValue"
           (blur)="focusLost()">
    @if (invalid() && touched()) {
        <mat-error>
            @for (error of errors(); track error.message) {
                <span>{{ error.message }}</span>
            }
        </mat-error>
    }
</mat-form-field>
