<form class="role-create" (appSubmit)="submitForm()">
    <div class="form-inputs">
        <div class="role-name">
            <mat-form-field>
                <mat-label>{{ 'Sysadmin.RoleSettings.NameLabel' | translate }}</mat-label>
                <input matInput [formField]="form.name"
                       [placeholder]="'Sysadmin.RoleSettings.NamePlaceholder' | translate">
                <mat-error [fField]="form.name"/>
            </mat-form-field>
        </div>
        <div class="role-type">
            <mat-form-field>
                <mat-select [formField]="form.type">
                    @for (option of roleTypeOptions; track option) {
                        <mat-option [value]="option">{{ option }}</mat-option>
                    }
                </mat-select>
            </mat-form-field>
        </div>
        <div class="role-permission">
            <mat-form-field>
                <mat-select [formField]="form.permissions"
                            [placeholder]="'Sysadmin.RoleSettings.PermissionsPlaceholder' | translate"
                            multiple>
                    @for (option of permissionOptions; track option) {
                        <mat-option [value]="option">{{ option }}</mat-option>
                    }
                </mat-select>
            </mat-form-field>
        </div>
    </div>
    <div class="btns">
        <button mat-icon-button [disabled]="saveButtonDisabled()">
            <mat-icon class="material-icons-outlined">save</mat-icon>
        </button>

        <button mat-icon-button type="button" (click)="cancel()">
            <mat-icon class="material-icons-outlined">close</mat-icon>
        </button>
    </div>
</form>
