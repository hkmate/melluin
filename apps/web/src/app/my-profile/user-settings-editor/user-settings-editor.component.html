<h1>{{ 'PersonPage.Settings' | translate }}</h1>

@let userIdValue = userId();
@let settingsValue = settings();
<mat-tab-group dynamicHeight>
    <mat-tab [label]="'PersonPage.EventListSettings.Title' | translate">
        <app-user-event-list-settings-editor [userId]="userIdValue" [settings]="settingsValue"/>
    </mat-tab>

    <mat-tab [label]="'PersonPage.HomePageSettings.Title' | translate">
        <app-user-home-page-settings-editor [userId]="userIdValue" [settings]="settingsValue"/>
    </mat-tab>

    <mat-tab [label]="'PersonPage.DepartmentBoxesWidgetSettings.Title' | translate">
        <app-user-department-box-widget-settings [userId]="userIdValue" [settings]="settingsValue"/>
    </mat-tab>
</mat-tab-group>
